name: Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [x64]
        config: [RelWithDebInfo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ONNX Runtime
        id: cache-onnx
        uses: actions/cache@v4
        with:
          path: C:\onnxruntime
          key: onnxruntime-1.15-${{ runner.arch }}

      - name: Download ONNX Runtime
        if: steps.cache-onnx.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.15.1/onnxruntime-win-x64-1.15.1.zip"
          $zip = "$env:TEMP\onnxruntime.zip"
          Write-Host "Downloading ONNX Runtime..."
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath C:\onnxruntime -Force
          Write-Host "Done"

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DONNX_RUNTIME_DIR="C:\onnxruntime\onnxruntime-win-x64-1.15.1"

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config ${{ matrix.config }} --parallel

      - name: Download MediaPipe model
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/mediapipe-models/selfie_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.onnx"
          $dir = "build\${{ matrix.config }}\models"
          New-Item -ItemType Directory -Force -Path $dir
          Invoke-WebRequest -Uri $url -OutFile "$dir\selfie_segmentation.onnx"

      - name: Package
        shell: pwsh
        run: |
          $srcDir = "build\${{ matrix.config }}"
          $outDir = "obs-ai-background-blur-artifact"
          New-Item -ItemType Directory -Force -Path $outDir
          Copy-Item "$srcDir\obs-ai-background-blur.dll" -Destination "$outDir\" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "shaders" -Destination "$outDir\shaders" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "$srcDir\models" -Destination "$outDir\models" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "resources" -Destination "$outDir\resources" -ErrorAction SilentlyContinue
          "Build ${{ github.run_number }} | Commit ${{ github.sha }}" | Out-File -FilePath "$outDir\version.txt" -Encoding utf8
          Compress-Archive -Path "$outDir\*" -DestinationPath "obs-ai-background-blur-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-ai-background-blur-${{ matrix.arch }}-${{ matrix.config }}
          path: obs-ai-background-blur-windows.zip
          compression-level: 0

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: obs-ai-background-blur-windows.zip
          body: |
            ## OBS AI Background Blur ${{ github.ref_name }}

            Contiene: plugin .dll, shaders, modelos ONNX y recursos.
